name: Publish packages to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  id-token: write

jobs:
  publish_mapvina_gl_platform_interface:
    uses: ./.github/workflows/publish-single.yml
    with:
      working-directory: mapvina_gl_platform_interface
  publish_mapvina_gl_web:
    needs: [publish_mapvina_gl_platform_interface]
    uses: ./.github/workflows/publish-single.yml
    with:
      working-directory: mapvina_gl_web
  publish_mapvina_gl:
    needs: [publish_mapvina_gl_platform_interface, publish_mapvina_gl_web]
    uses: ./.github/workflows/publish-single.yml
    with:
      working-directory: mapvina_gl
